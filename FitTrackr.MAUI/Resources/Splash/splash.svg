<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220">

  <!-- ══════════════════════════════════════════
       FitTracker Splash Screen
       Tema: #121212 arka plan (csproj'tan),
             #FF7043 turuncu vurgu, beyaz metin
       ══════════════════════════════════════════ -->

  <!-- ── DUMBBELL İKONU (merkez y≈85) ── -->

  <!-- Sol dış plaka -->
  <rect x="22"  y="55" width="34" height="62" rx="8" fill="#FF7043"/>
  <!-- Sol plaka alt gölge -->
  <rect x="22"  y="96" width="34" height="21" rx="4" fill="#BF360C" opacity="0.55"/>
  <!-- Sol iç kelepçe -->
  <rect x="12"  y="66" width="17" height="40" rx="6" fill="#E64A19"/>

  <!-- Orta bar -->
  <rect x="56"  y="72" width="208" height="28" rx="7" fill="#FF7043"/>
  <!-- Bar üst parlaklık çizgisi -->
  <rect x="60"  y="73" width="198" height="7"  rx="3" fill="#FFAB91" opacity="0.40"/>
  <!-- Bar alt gölge -->
  <rect x="56"  y="90" width="208" height="10" rx="5" fill="#BF360C" opacity="0.30"/>

  <!-- Sağ iç kelepçe -->
  <rect x="291" y="66" width="17" height="40" rx="6" fill="#E64A19"/>
  <!-- Sağ dış plaka -->
  <rect x="264" y="55" width="34" height="62" rx="8" fill="#FF7043"/>
  <!-- Sağ plaka alt gölge -->
  <rect x="264" y="96" width="34" height="21" rx="4" fill="#BF360C" opacity="0.55"/>

  <!-- ── UYGULAMA ADI ── -->
  <text x="160"
        y="152"
        text-anchor="middle"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="44"
        font-weight="900"
        fill="white"
        letter-spacing="1">FitTracker</text>

  <!-- İsim altı turuncu vurgu çizgisi -->
  <rect x="88" y="160" width="144" height="3" rx="1.5" fill="#FF7043" opacity="0.90"/>

  <!-- ── TAGLINE ── -->
  <text x="160"
        y="191"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#FFAB91"
        letter-spacing="3.5">TRACK · PROGRESS · WIN</text>

</svg>
